name: Windows MSVC Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Windows MSVC
    runs-on: windows-latest

    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}\\vcpkg-cache,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Checkout vcpkg
        uses: actions/checkout@v5
        with:
          repository: microsoft/vcpkg
          path: vcpkg
          fetch-depth: 1

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Check Ninja
        shell: pwsh
        run: ninja --version

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_DEFAULT_TRIPLET }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_DEFAULT_TRIPLET }}-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: '& "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics'

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="$env:VCPKG_DEFAULT_TRIPLET" `
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Test
        shell: pwsh
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GameControllerMIDI-windows-msvc
          path: |
            build/bin/GameControllerMIDI.vst3
            build/bin/GameControllerMIDI.clap
            build/bin/GameControllerMIDI-vst2.dll
          if-no-files-found: warn
