name: macOS Build

on:
  workflow_dispatch:

jobs:
  build:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
            triplet: x64-osx
          - arch: arm64
            runner: macos-15
            triplet: arm64-osx

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-cache,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Checkout vcpkg
        uses: actions/checkout@v5
        with:
          repository: microsoft/vcpkg
          path: vcpkg
          fetch-depth: 1

      - name: Check tools
        run: |
          cmake --version
          ninja --version
          clang++ --version

      - name: Cache vcpkg binary packages
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.triplet }}-

      - name: Bootstrap vcpkg
        run: "$VCPKG_ROOT/bootstrap-vcpkg.sh -disableMetrics"

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}" \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: List build output
        if: always()
        run: find build -maxdepth 4 -type f -o -type d | sort | sed -n '1,200p'

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v6
        with:
          name: GameControllerMIDI-macos-${{ matrix.arch }}
          path: |
            build/bin/*
          if-no-files-found: warn
